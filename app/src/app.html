<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta name="theme-color" content="#BC002D" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Hinomaru" />
		<meta name="mobile-web-app-capable" content="yes" />

		<script>
			// FOUC prevention only — must run sync before paint.
			(function () {
				try {
					var t = localStorage.getItem('hm-theme') || 'system';
					if (t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)) {
						document.documentElement.setAttribute('data-theme', 'dark');
					}
				} catch (e) {}
			})();
		</script>

		<!-- Favicons -->
		<link rel="icon" type="image/png" href="/favicon.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">%sveltekit.body%</body>
</html>
