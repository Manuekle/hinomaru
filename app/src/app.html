<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
		<meta name="theme-color" content="#BC002D" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Hinomaru" />
		
		<!-- Favicons -->
		<link rel="icon" type="image/png" href="/favicon.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		
		<!-- SEO -->
		<title>Hinomaru Japanese — Master Kanji, Grammar & Vocabulary</title>
		<meta name="description" content="Master Japanese with Hinomaru. The premium, minimalist tool for JLPT N5-N1. Smart SRS reviews, handwriting practice, and dynamic quizzes." />
		
		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://hinomaru.app/" />
		<meta property="og:title" content="Hinomaru Japanese — Master Japanese one card at a time" />
		<meta property="og:description" content="The ultimate minimalist Japanese study tool. SRS tracking, stroke practice, and JLPT mastery." />
		<meta property="og:image" content="/landing_hero.png" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://hinomaru.app/" />
		<meta property="twitter:title" content="Hinomaru Japanese" />
		<meta property="twitter:description" content="Study Japanese with precision and style. Minimalist, focused, effective." />
		<meta property="twitter:image" content="/landing_hero.png" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
