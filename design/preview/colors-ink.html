<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 160px;">
  <div style="display:grid; grid-template-columns: repeat(7, 1fr); gap: 8px;">
    <div style="display:flex; flex-direction:column; gap:6px;"><div style="height:64px; border-radius:12px; background:#FAFAF9; border:1px solid var(--ink-200);"></div><div class="mono-label">50</div></div>
    <div style="display:flex; flex-direction:column; gap:6px;"><div style="height:64px; border-radius:12px; background:#F2F2F1;"></div><div class="mono-label">100</div></div>
    <div style="display:flex; flex-direction:column; gap:6px;"><div style="height:64px; border-radius:12px; background:#E8E6E2;"></div><div class="mono-label">200</div></div>
    <div style="display:flex; flex-direction:column; gap:6px;"><div style="height:64px; border-radius:12px; background:#D4D2CE;"></div><div class="mono-label">300</div></div>
    <div style="display:flex; flex-direction:column; gap:6px;"><div style="height:64px; border-radius:12px; background:#A8A6A2;"></div><div class="mono-label">400</div></div>
    <div style="display:flex; flex-direction:column; gap:6px;"><div style="height:64px; border-radius:12px; background:#6E6C69;"></div><div class="mono-label">500</div></div>
    <div style="display:flex; flex-direction:column; gap:6px;"><div style="height:64px; border-radius:12px; background:#2E2D2B;"></div><div class="mono-label">700</div></div>
  </div>
  <div style="font-size: 12px; color: var(--fg-secondary); margin-top: 4px;">Borders default to <code style="font-family:var(--font-mono);font-size:11px;">ink-200</code>. Secondary text uses <code style="font-family:var(--font-mono);font-size:11px;">ink-500</code>.</div>
</div></body></html>
