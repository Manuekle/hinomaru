<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 340px; padding: 24px; flex-direction: row; justify-content: center; align-items: center; gap: 24px;">
  <div style="width: 240px; height: 300px; background: #fff; border-radius: 24px; box-shadow: 0 1px 2px rgba(26,26,26,0.04), 0 1px 1px rgba(26,26,26,0.03); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px; text-align: center;">
    <div style="position:absolute; top: 40px; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-tertiary);">N5</div>
    <div style="font-family: var(--font-jp); font-size: 72px; font-weight: 500; color: var(--sumi); line-height: 1;">水</div>
    <div style="font-size: 12px; color: var(--fg-tertiary); margin-top: 24px;">tap to flip</div>
  </div>
  <div style="width: 240px; height: 300px; background: #fff; border-radius: 24px; box-shadow: 0 4px 16px rgba(26,26,26,0.06), 0 2px 4px rgba(26,26,26,0.04); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px; text-align: center; gap: 6px;">
    <div style="font-size: 32px; font-weight: 700; letter-spacing: -0.02em; color: var(--sumi); line-height: 1;">Water</div>
    <div style="font-size: 14px; letter-spacing: 0.04em; color: var(--fg-secondary); margin-top: 4px;">mi·zu</div>
    <div style="margin-top: 20px; font-family: var(--font-jp); font-size: 14px; color: var(--fg-secondary);">水を飲みます。</div>
    <div style="font-size: 12px; color: var(--fg-tertiary); max-width: 180px;">I drink water.</div>
  </div>
</div></body></html>
