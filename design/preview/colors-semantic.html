<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 180px;">
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
    <div style="display:flex; flex-direction:column; gap: 8px;">
      <div style="display:flex; gap: 8px;">
        <div style="flex:1; height: 56px; border-radius: 12px; background: #2E7D5B;"></div>
        <div style="flex:1; height: 56px; border-radius: 12px; background: #E9F3EE;"></div>
      </div>
      <div style="font-weight: 600; font-size: 13px;">Success</div>
      <div class="mono-label">#2E7D5B · #E9F3EE</div>
    </div>
    <div style="display:flex; flex-direction:column; gap: 8px;">
      <div style="display:flex; gap: 8px;">
        <div style="flex:1; height: 56px; border-radius: 12px; background: #A8741A;"></div>
        <div style="flex:1; height: 56px; border-radius: 12px; background: #F6EEDC;"></div>
      </div>
      <div style="font-weight: 600; font-size: 13px;">Warning</div>
      <div class="mono-label">#A8741A · #F6EEDC</div>
    </div>
    <div style="display:flex; flex-direction:column; gap: 8px;">
      <div style="display:flex; gap: 8px;">
        <div style="flex:1; height: 56px; border-radius: 12px; background: #BC002D;"></div>
        <div style="flex:1; height: 56px; border-radius: 12px; background: #FDECEF;"></div>
      </div>
      <div style="font-weight: 600; font-size: 13px;">Error / Accent</div>
      <div class="mono-label">#BC002D · #FDECEF</div>
    </div>
  </div>
</div></body></html>
