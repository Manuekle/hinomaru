<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 180px;">
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; height: 100%;">
    <div style="display:flex; flex-direction:column; gap:8px;">
      <div style="height: 80px; border-radius: 16px; background: #BC002D;"></div>
      <div style="font-weight: 600; font-size: 13px;">Hinomaru red</div>
      <div class="mono-label">#BC002D</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <div style="height: 80px; border-radius: 16px; background: #1A1A1A;"></div>
      <div style="font-weight: 600; font-size: 13px;">Sumi</div>
      <div class="mono-label">#1A1A1A</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <div style="height: 80px; border-radius: 16px; background: #FFFFFF; border: 1px solid var(--ink-200);"></div>
      <div style="font-weight: 600; font-size: 13px;">Washi</div>
      <div class="mono-label">#FFFFFF</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <div style="height: 80px; border-radius: 16px; background: #F7F5F2; border: 1px solid var(--ink-200);"></div>
      <div style="font-weight: 600; font-size: 13px;">Paper</div>
      <div class="mono-label">#F7F5F2</div>
    </div>
  </div>
</div></body></html>
