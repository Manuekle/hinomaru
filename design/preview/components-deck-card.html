<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 240px; padding: 24px; flex-direction: row; gap: 16px; align-items: center; justify-content: center;">
  <div style="width: 280px; background: #fff; border: 1px solid var(--ink-200); border-radius: 24px; padding: 20px; box-shadow: 0 1px 2px rgba(26,26,26,0.04);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
      <span style="display:inline-flex; height:24px; padding:0 10px; border-radius:999px; background:#FDECEF; color:#9A0025; font:600 11px var(--font-ui); letter-spacing:0.08em; align-items:center;">N5</span>
      <span style="font-size: 12px; color: var(--fg-secondary);">212 words</span>
    </div>
    <div style="font-size: 22px; font-weight: 600; letter-spacing: -0.01em;">Daily conversation</div>
    <div style="font-size: 14px; color: var(--fg-secondary); margin-top: 4px; line-height: 1.5;">Words you'll hear first. About 5 minutes per session.</div>
    <div style="height: 4px; background: var(--ink-100); border-radius: 999px; margin-top: 20px;"><div style="width: 42%; height: 100%; background: var(--hinomaru-red); border-radius: 999px;"></div></div>
    <div style="font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-secondary); margin-top: 8px;">89 of 212 learned</div>
  </div>
  <div style="width: 280px; background: #fff; border: 1px solid var(--ink-200); border-radius: 24px; padding: 20px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
      <span style="display:inline-flex; height:24px; padding:0 10px; border-radius:999px; background:var(--ink-100); color:var(--ink-700); font:600 11px var(--font-ui); letter-spacing:0.08em; align-items:center;">HIRAGANA</span>
      <span style="font-size: 12px; color: #2E7D5B; font-weight: 600;">✓ Complete</span>
    </div>
    <div style="font-size: 22px; font-weight: 600; letter-spacing: -0.01em;">All 46 characters</div>
    <div style="font-size: 14px; color: var(--fg-secondary); margin-top: 4px;">Foundational. Start here if it's your first time.</div>
    <div style="height: 4px; background: var(--ink-100); border-radius: 999px; margin-top: 20px;"><div style="width: 100%; height: 100%; background: #2E7D5B; border-radius: 999px;"></div></div>
  </div>
</div></body></html>
