<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 180px;">
  <div style="display:flex; gap: 10px; flex-wrap: wrap; align-items: center;">
    <span style="display:inline-flex; height:26px; padding:0 12px; border-radius:999px; background:#FDECEF; color:#9A0025; font:600 12px var(--font-ui); letter-spacing:0.04em; align-items:center;">N5</span>
    <span style="display:inline-flex; height:26px; padding:0 12px; border-radius:999px; background:var(--ink-100); color:var(--ink-700); font:600 12px var(--font-ui); letter-spacing:0.04em; align-items:center;">VOCABULARY</span>
    <span style="display:inline-flex; height:26px; padding:0 12px; border-radius:999px; background:#E9F3EE; color:#2E7D5B; font:600 12px var(--font-ui); letter-spacing:0.04em; align-items:center; gap:4px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Learned</span>
    <span style="display:inline-flex; height:26px; padding:0 12px; border-radius:999px; background:#F6EEDC; color:#A8741A; font:600 12px var(--font-ui); letter-spacing:0.04em; align-items:center;">Review</span>
  </div>
  <div style="display:flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 12px;">
    <span style="display:inline-flex; height:40px; padding:0 18px; border-radius:999px; background:#fff; border:1px solid var(--ink-200); color:var(--sumi); font:500 15px var(--font-ui); align-items:center;">to</span>
    <span style="display:inline-flex; height:40px; padding:0 18px; border-radius:999px; background:#fff; border:1px solid var(--ink-200); color:var(--sumi); font:500 15px var(--font-ui); align-items:center;">sleeping</span>
    <span style="display:inline-flex; height:40px; padding:0 18px; border-radius:999px; background:var(--sumi); color:#fff; font:500 15px var(--font-ui); align-items:center;">time</span>
    <span style="display:inline-flex; height:40px; padding:0 18px; border-radius:999px; background:#fff; border:1px solid var(--ink-200); color:var(--sumi); font:500 15px var(--font-ui); align-items:center;">bed</span>
  </div>
  <div style="font-size: 12px; color: var(--fg-secondary); margin-top: 4px;">Small metadata pills (top) vs. quiz choice chips (bottom).</div>
</div></body></html>
