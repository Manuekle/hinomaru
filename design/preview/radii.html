<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 180px; flex-direction: row; align-items: center; justify-content: space-around; padding: 24px 40px;">
  <div style="display:flex; flex-direction:column; align-items:center; gap: 10px;">
    <div style="width: 72px; height: 72px; background: var(--washi); border: 1px solid var(--ink-200); border-radius: 8px;"></div>
    <div style="font-weight: 600; font-size: 13px;">sm</div>
    <div class="mono-label">8px · pills, tags</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap: 10px;">
    <div style="width: 72px; height: 72px; background: var(--washi); border: 1px solid var(--ink-200); border-radius: 16px;"></div>
    <div style="font-weight: 600; font-size: 13px;">md</div>
    <div class="mono-label">16px · buttons, inputs</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap: 10px;">
    <div style="width: 72px; height: 72px; background: var(--washi); border: 1px solid var(--ink-200); border-radius: 24px;"></div>
    <div style="font-weight: 600; font-size: 13px;">lg</div>
    <div class="mono-label">24px · cards, modals</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap: 10px;">
    <div style="width: 72px; height: 72px; background: var(--washi); border: 1px solid var(--ink-200); border-radius: 999px;"></div>
    <div style="font-weight: 600; font-size: 13px;">full</div>
    <div class="mono-label">999px · avatar, mark</div>
  </div>
</div></body></html>
