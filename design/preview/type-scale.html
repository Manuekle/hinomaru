<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 360px;">
  <div style="display:grid; grid-template-columns: 1fr auto; gap: 12px 24px; align-items: baseline;">
    <div style="font-size: 40px; font-weight: 700; letter-spacing: -0.02em;">Learn Japanese</div>
    <div class="mono-label">h1 / 40 / 700</div>

    <div style="font-size: 28px; font-weight: 600; letter-spacing: -0.02em;">Your decks</div>
    <div class="mono-label">h2 / 28 / 600</div>

    <div style="font-size: 22px; font-weight: 600;">N5 vocabulary</div>
    <div class="mono-label">h3 / 22 / 600</div>

    <div style="font-size: 18px;">Large body, for lesson intros.</div>
    <div class="mono-label">lead / 18 / 400</div>

    <div style="font-size: 16px;">Default body copy runs here at 16px, 1.55 line height.</div>
    <div class="mono-label">body / 16 / 400</div>

    <div style="font-size: 14px; color: var(--fg-secondary);">Secondary / caption text in ink-500.</div>
    <div class="mono-label">small / 14 / 400</div>

    <div style="font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--fg-secondary);">N5 · vocabulary</div>
    <div class="mono-label">meta / 12 / 600 tracked</div>
  </div>
</div></body></html>
