<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 220px; flex-direction: row; align-items: center; justify-content: space-around; padding: 0 40px; gap: 40px;">
  <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
    <div style="width: 96px; height: 96px; background: var(--hinomaru-red); border-radius: 50%;"></div>
    <div class="mono-label">mark / 96px</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:flex-start; gap:12px;">
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width: 40px; height: 40px; background: var(--hinomaru-red); border-radius: 50%;"></div>
      <div style="font-size: 36px; font-weight: 700; letter-spacing: -0.02em; color: var(--sumi);">Hinomaru</div>
    </div>
    <div class="mono-label">wordmark</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
    <div style="font-family: var(--font-jp); font-size: 64px; color: var(--sumi); line-height: 1;">日の丸</div>
    <div class="mono-label">日本語 / jp</div>
  </div>
</div></body></html>
