<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 280px;">
  <div style="display:flex; align-items:baseline; gap: 40px; border-bottom: 1px solid var(--ink-200); padding-bottom: 16px;">
    <div style="font-family: var(--font-jp); font-size: 120px; font-weight: 500; color: var(--sumi); line-height: 0.9;">桜</div>
    <div style="display:flex; flex-direction:column; gap: 2px;">
      <div class="mono-label">display / 120px / Noto Sans JP 500</div>
      <div style="font-size: 14px; color: var(--fg-secondary);">Hero flashcard glyph</div>
    </div>
  </div>
  <div style="display:flex; align-items:baseline; gap: 40px;">
    <div style="font-size: 80px; font-weight: 700; letter-spacing: -0.02em; color: var(--sumi); line-height: 1;">Sakura</div>
    <div style="display:flex; flex-direction:column; gap: 2px;">
      <div class="mono-label">display / 80px / Inter Tight 700</div>
      <div style="font-size: 14px; color: var(--fg-secondary);">Flashcard word</div>
    </div>
  </div>
