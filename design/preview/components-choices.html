<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 300px; padding: 24px;">
  <div style="display:flex; flex-direction: column; gap: 10px; max-width: 520px; margin: 0 auto;">
    <div style="padding: 18px 20px; background: #fff; border: 1px solid var(--ink-200); border-radius: 16px; font: 500 16px var(--font-ui); color: var(--sumi);">rise</div>
    <div style="padding: 18px 20px; background: #fff; border: 1.5px solid var(--sumi); border-radius: 16px; font: 600 16px var(--font-ui); color: var(--sumi); box-shadow: 0 0 0 3px rgba(188,0,45,0.18);">fall <span style="float:right; color: var(--fg-tertiary); font-weight: 400;">selected</span></div>
    <div style="padding: 18px 20px; background: #E9F3EE; border: 1.5px solid #2E7D5B; border-radius: 16px; font: 600 16px var(--font-ui); color: #1d5d43;">decrease <span style="float:right;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></div>
    <div style="padding: 18px 20px; background: #FDECEF; border: 1.5px solid #BC002D; border-radius: 16px; font: 600 16px var(--font-ui); color: #9A0025;">descend <span style="float:right;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></span></div>
  </div>
</div></body></html>
