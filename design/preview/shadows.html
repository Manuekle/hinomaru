<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 200px; flex-direction: row; align-items: center; justify-content: space-around; padding: 32px 40px;">
  <div style="display:flex; flex-direction:column; align-items:center; gap: 12px;">
    <div style="width: 160px; height: 100px; background: var(--washi); border-radius: 16px; box-shadow: 0 1px 2px rgba(26,26,26,0.04), 0 1px 1px rgba(26,26,26,0.03);"></div>
    <div style="font-weight: 600; font-size: 13px;">shadow-sm</div>
    <div class="mono-label">resting cards</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap: 12px;">
    <div style="width: 160px; height: 100px; background: var(--washi); border-radius: 16px; box-shadow: 0 4px 16px rgba(26,26,26,0.06), 0 2px 4px rgba(26,26,26,0.04);"></div>
    <div style="font-weight: 600; font-size: 13px;">shadow-md</div>
    <div class="mono-label">hover / lifted</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap: 12px;">
    <div style="width: 160px; height: 100px; background: var(--washi); border-radius: 16px; box-shadow: 0 0 0 3px rgba(188,0,45,0.18);"></div>
    <div style="font-weight: 600; font-size: 13px;">focus ring</div>
    <div class="mono-label">0 0 0 3px red/18</div>
  </div>
</div></body></html>
