<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="_card.css">
</head>

<body>
  <div class="card" style="min-height: 340px; padding: 24px; align-items: center;">
    <div
      style="font-size: 11px; font-weight: 600; letter-spacing: -0.04em; text-transform: uppercase; color: var(--fg-tertiary); margin-bottom: 8px;">
      Write this character</div>
    <div style="display:flex; align-items:center; gap: 12px;">
      <div style="font-size: 22px; font-weight: 700;">Water</div>
      <div
        style="width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--ink-200); background:#fff; display:inline-flex; align-items:center; justify-content:center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
        </svg></div>
    </div>
    <div
      style="position: relative; width: 260px; height: 260px; background: #fff; border-radius: 24px; box-shadow: 0 1px 2px rgba(26,26,26,0.04); margin-top: 12px; overflow: hidden;">
      <div style="position:absolute; inset:16px; border:1px solid var(--ink-200); border-radius:12px;"></div>
      <div style="position:absolute; top:50%; left:16px; right:16px; border-top:1px dashed #E8E6E2;"></div>
      <div style="position:absolute; left:50%; top:16px; bottom:16px; border-left:1px dashed #E8E6E2;"></div>
      <div
        style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family: var(--font-jp); font-size: 180px; font-weight: 500; color: #F2F2F1; line-height: 1;">
        水</div>
      <svg style="position:absolute; inset:0;" width="260" height="260" viewBox="0 0 260 260" fill="none"
        stroke="#1A1A1A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M130 60 L130 200" />
        <path d="M100 110 Q90 140 80 190" />
        <path d="M160 110 Q170 140 180 190" />
      </svg>
    </div>
    <div style="font-size: 12px; color: var(--fg-secondary); margin-top: 10px;">Canvas + faint 下書き guide · clear / show
      guide toggles</div>
  </div>
</body>

</html>
