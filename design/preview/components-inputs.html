<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="_card.css">
</head>

<body>
  <div class="card" style="min-height: 260px;">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
      <div>
        <div
          style="font-size: 12px; font-weight: 600; letter-spacing: -0.04em; text-transform: uppercase; color: var(--fg-secondary); margin-bottom: 8px;">
          Email</div>
        <input placeholder="you@example.com"
          style="width:100%; box-sizing:border-box; height:48px; padding: 0 16px; border: 1px solid var(--ink-200); border-radius: 16px; background:#fff; font: 400 16px var(--font-ui); color: var(--sumi); outline: none;" />
      </div>
      <div>
        <div
          style="font-size: 12px; font-weight: 600; letter-spacing: -0.04em; text-transform: uppercase; color: var(--fg-secondary); margin-bottom: 8px;">
          Password · focus</div>
        <input type="password" value="••••••••"
          style="width:100%; box-sizing:border-box; height:48px; padding: 0 16px; border: 1.5px solid var(--sumi); border-radius: 16px; background:#fff; font: 400 16px var(--font-ui); color: var(--sumi); outline: none; box-shadow: 0 0 0 3px rgba(188,0,45,0.18);" />
      </div>
      <div>
        <div
          style="font-size: 12px; font-weight: 600; letter-spacing: -0.04em; text-transform: uppercase; color: var(--fg-secondary); margin-bottom: 8px;">
          Answer · correct</div>
        <input value="sakura"
          style="width:100%; box-sizing:border-box; height:48px; padding: 0 16px; border: 1.5px solid #2E7D5B; border-radius: 16px; background:#E9F3EE; font: 500 16px var(--font-ui); color: #1d5d43; outline: none;" />
      </div>
      <div>
        <div
          style="font-size: 12px; font-weight: 600; letter-spacing: -0.04em; text-transform: uppercase; color: var(--fg-secondary); margin-bottom: 8px;">
          Answer · wrong</div>
        <input value="sakira"
          style="width:100%; box-sizing:border-box; height:48px; padding: 0 16px; border: 1.5px solid #BC002D; border-radius: 16px; background:#FDECEF; font: 500 16px var(--font-ui); color: #9A0025; outline: none;" />
      </div>
    </div>
  </div>
</body>

</html>
