<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="min-height: 220px;">
  <div style="display:flex; gap: 12px; align-items: center; flex-wrap: wrap;">
    <button style="height:48px; padding: 0 24px; background: #BC002D; color:#fff; border:none; border-radius: 16px; font: 600 16px var(--font-ui); cursor:pointer;">Continue</button>
    <button style="height:48px; padding: 0 24px; background: #9A0025; color:#fff; border:none; border-radius: 16px; font: 600 16px var(--font-ui); cursor:pointer;">Continue</button>
    <button style="height:48px; padding: 0 24px; background: #fff; color: var(--sumi); border: 1px solid var(--ink-200); border-radius: 16px; font: 600 16px var(--font-ui); cursor:pointer;">Skip</button>
    <button style="height:48px; padding: 0 24px; background: transparent; color: var(--sumi); border: none; border-radius: 16px; font: 600 16px var(--font-ui); cursor:pointer;">Cancel</button>
    <button style="height:48px; padding: 0 24px; background: var(--ink-100); color: var(--ink-400); border: none; border-radius: 16px; font: 600 16px var(--font-ui);" disabled>Continue</button>
  </div>
  <div style="display:flex; gap: 8px; margin-top: 8px;">
    <div style="font-size:11px; color:var(--fg-tertiary); width:120px;">primary</div>
    <div style="font-size:11px; color:var(--fg-tertiary); width:120px;">:hover</div>
    <div style="font-size:11px; color:var(--fg-tertiary); width:88px;">secondary</div>
    <div style="font-size:11px; color:var(--fg-tertiary); width:88px;">ghost</div>
    <div style="font-size:11px; color:var(--fg-tertiary);">disabled</div>
  </div>
  <div style="display:flex; gap: 12px; align-items: center; margin-top: 12px;">
    <button style="height:36px; padding: 0 14px; background: #BC002D; color:#fff; border:none; border-radius: 12px; font: 600 13px var(--font-ui);">Small</button>
    <button style="height:56px; padding: 0 28px; background: #BC002D; color:#fff; border:none; border-radius: 16px; font: 600 17px var(--font-ui);">Large</button>
    <button style="width:48px; height:48px; background: transparent; border: 1px solid var(--ink-200); border-radius: 50%; display:inline-flex; align-items:center; justify-content:center; color: var(--sumi);"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
  </div>
</div></body></html>
